name: API CI/CD — FTS

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - ".github/workflows/api.yml"
  workflow_dispatch:

jobs:
  typecheck-and-build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies (workspace root)
        run: npm ci --workspace=apps/api --include-workspace-root

      - name: Typecheck
        working-directory: apps/api
        run: npm run typecheck

      - name: Build
        working-directory: apps/api
        run: npm run build

  deploy:
    name: Deploy to FTS (desky)
    needs: typecheck-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger FTS deployment webhook
        run: |
          curl -sSf -X POST \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -d '{"ref": "${{ github.ref }}"}' \
            https://webhook.foothilltech.net/hooks/foothill-park-deploy
